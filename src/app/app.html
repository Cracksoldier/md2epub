<div class="app-shell">
  <app-toolbar
    [exportLoading]="exportLoading()"
    (importClick)="editorPaneRef.openFileDialog()"
    (settingsClick)="toggleSettings()"
    (exportClick)="onExport()"
  ></app-toolbar>

  <main class="workspace" [style.grid-template-columns]="gridColumns()">
    <app-editor-pane #editorPaneRef></app-editor-pane>
    <app-pane-divider (ratioChange)="onPaneRatio($event)"></app-pane-divider>
    <app-preview-pane></app-preview-pane>
  </main>

  <div
    class="backdrop"
    [class.is-visible]="settingsOpen()"
    (click)="settingsOpen.set(false)"
    aria-hidden="true"
  ></div>

  <app-settings-panel
    [isOpen]="settingsOpen()"
    (closePanel)="settingsOpen.set(false)"
  ></app-settings-panel>

  <app-toast></app-toast>
</div>

@if (showWelcome()) {
  <app-welcome-modal (close)="onWelcomeClosed()"></app-welcome-modal>
}
