<header class="toolbar">
  <div class="toolbar__brand">
    <svg class="toolbar__logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="4" width="18" height="24" rx="2" fill="#1e3a6e" stroke="#2563eb" stroke-width="1.5"/>
      <path d="M7 10h8M7 14h8M7 18h5" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 18l4 4-4 4" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M26 22H18" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="toolbar__title">MD <span class="toolbar__arrow">→</span> EPUB</span>
  </div>

  <div class="toolbar__actions">
    <button class="btn btn--ghost" (click)="importClick.emit()" [title]="i18n.t('toolbar.importTitle')">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7.5 1v9M4 7l3.5 3.5L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1 11v1a2 2 0 002 2h9a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="btn__label">{{ i18n.t('toolbar.import') }}</span>
    </button>

    <button class="btn btn--ghost" (click)="loadProjectClick.emit()" [title]="i18n.t('toolbar.loadProjectTitle')">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M1 4.5A1.5 1.5 0 012.5 3H6l1.5 2h5A1.5 1.5 0 0114 6.5v5a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 11.5v-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7.5 6.5v4M5.5 8.5l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="btn__label">{{ i18n.t('toolbar.loadProject') }}</span>
    </button>

    <button class="btn btn--ghost" (click)="saveProjectClick.emit()" [title]="i18n.t('toolbar.saveProjectTitle')">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1.5" y="1.5" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <rect x="4" y="1.5" width="5" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/>
        <rect x="3" y="8" width="9" height="5" rx="0.5" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="btn__label">{{ i18n.t('toolbar.saveProject') }}</span>
    </button>

    <button class="btn btn--ghost" (click)="settingsClick.emit()" [title]="i18n.t('toolbar.settingsTitle')">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.93 2.93l1.06 1.06M11.01 11.01l1.06 1.06M2.93 12.07l1.06-1.06M11.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="btn__label">{{ i18n.t('toolbar.settings') }}</span>
    </button>

    <div class="toolbar__locale-wrap" [class.is-open]="localeOpen()">
      <button
        class="toolbar__locale-trigger"
        (click)="toggleLocale($event)"
        [attr.aria-label]="i18n.t('toolbar.languageLabel')"
        [attr.aria-expanded]="localeOpen()"
        aria-haspopup="listbox"
      >
        <app-flag-icon [locale]="i18n.locale()"></app-flag-icon>
        <span class="toolbar__locale-label">{{ currentLocaleLabel() }}</span>
        <svg class="toolbar__locale-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      @if (localeOpen()) {
        <div class="locale-dropdown" role="listbox" [attr.aria-label]="i18n.t('toolbar.languageLabel')" (keydown)="onDropdownKeydown($event)">
          @for (loc of i18n.locales; track loc.code) {
            <button
              #localeOption
              class="locale-option"
              role="option"
              [class.is-active]="i18n.locale() === loc.code"
              [attr.aria-selected]="i18n.locale() === loc.code"
              (click)="selectLocale(loc.code)"
            >
              <app-flag-icon [locale]="loc.code"></app-flag-icon>
              {{ loc.label }}
            </button>
          }
        </div>
      }
    </div>

    <button
      class="btn btn--primary"
      [disabled]="exportLoading()"
      (click)="exportClick.emit()"
      [title]="i18n.t('toolbar.exportTitle')"
    >
      @if (exportLoading()) {
        <span class="spinner"></span>
        <span class="btn__label">{{ i18n.t('toolbar.generating') }}</span>
      } @else {
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7.5 1v9M4 7l3.5 3.5L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 11v1a2 2 0 002 2h9a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="btn__label">{{ i18n.t('toolbar.exportEpub') }}</span>
      }
    </button>

    <a class="btn btn--coffee" href="#" title="Buy me a coffee" (click)="$event.preventDefault()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 5h9v5a4 4 0 01-4 4H7a4 4 0 01-4-4V5z" stroke="currentColor" stroke-width="1.4"/>
        <path d="M12 6h1a2 2 0 010 4h-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6 2c0-1 1-1.5 1-2.5M8.5 2c0-1 1-1.5 1-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span class="btn__label">Buy me a coffee</span>
    </a>
  </div>
</header>
