<nav class="chapter-list" aria-label="{{ i18n.t('chapterList.label') }}">
  <div class="chapter-list__header">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="0.65" y="0.65" width="10.7" height="10.7" rx="1.35" stroke="currentColor" stroke-width="1.3"/>
      <path d="M3 3.5h6M3 6h6M3 8.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <span>{{ i18n.t('chapterList.label') }}</span>
  </div>

  <div class="chapter-list__items" role="list">
    @if (chapters().length === 0) {
      <p class="chapter-list__empty">{{ i18n.t('chapterList.noChapters') }}</p>
    } @else {
      @for (ch of chapters(); track ch.offset; let i = $index) {
        <div
          class="chapter-list__item"
          [class.is-dragging]="dragFrom() === i"
          [class.drop-before]="dragOver() === i && isDragging() && dragFrom() !== i"
          draggable="true"
          role="listitem"
          (dragstart)="onDragStart($event, i)"
          (dragover)="onDragOver($event, i)"
          (dragleave)="onDragLeave($event, i)"
          (drop)="onDrop($event, i)"
          (dragend)="onDragEnd()"
        >
          <span class="chapter-list__handle" aria-hidden="true">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="3" cy="2" r="1" fill="currentColor"/>
              <circle cx="7" cy="2" r="1" fill="currentColor"/>
              <circle cx="3" cy="5" r="1" fill="currentColor"/>
              <circle cx="7" cy="5" r="1" fill="currentColor"/>
              <circle cx="3" cy="8" r="1" fill="currentColor"/>
              <circle cx="7" cy="8" r="1" fill="currentColor"/>
            </svg>
          </span>
          <span class="chapter-list__num">{{ i + 1 }}</span>
          <button
            class="chapter-list__title"
            (click)="chapterSelect.emit(ch.offset)"
            (mousedown)="$event.stopPropagation()"
            [title]="ch.title"
          >{{ ch.title }}</button>
          <span class="chapter-list__move" aria-hidden="false">
            <button
              type="button"
              class="chapter-list__move-btn"
              [disabled]="i === 0"
              (click)="moveChapter(i, -1)"
              (mousedown)="$event.stopPropagation()"
              [attr.aria-label]="i18n.t('chapterList.moveUp')"
              [title]="i18n.t('chapterList.moveUp')"
            >
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 6.5L5 3.5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button
              type="button"
              class="chapter-list__move-btn"
              [disabled]="i === chapters().length - 1"
              (click)="moveChapter(i, 1)"
              (mousedown)="$event.stopPropagation()"
              [attr.aria-label]="i18n.t('chapterList.moveDown')"
              [title]="i18n.t('chapterList.moveDown')"
            >
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 3.5L5 6.5l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </span>
        </div>
        @if (ch.subchapters.length > 0) {
          <div class="chapter-list__subitems">
            @for (sub of ch.subchapters; track sub.offset) {
              <button
                class="chapter-list__subitem"
                (click)="chapterSelect.emit(sub.offset)"
                [title]="sub.title"
              >{{ sub.title }}</button>
            }
          </div>
        }
      }
    }
  </div>
</nav>
