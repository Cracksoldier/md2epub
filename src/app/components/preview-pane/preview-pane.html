<section class="pane pane--preview">
  <div class="pane__header">
    <span class="pane__label">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M1 7s2.5-4.5 6-4.5S13 7 13 7s-2.5 4.5-6 4.5S1 7 1 7z" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="7" cy="7" r="1.5" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      {{ i18n.t('preview.label') }}
    </span>
    @if (chapterCount() > 0) {
      <span class="chapter-badge">
        {{ chapterCount() }} {{ chapterCount() !== 1 ? i18n.t('preview.chapters') : i18n.t('preview.chapter') }}
      </span>
    }
  </div>
  <div class="preview-scroll" #scrollContainer (scroll)="onPreviewScroll($event)">
    <div class="preview prose" [innerHTML]="safeHtml()"></div>
  </div>
</section>
