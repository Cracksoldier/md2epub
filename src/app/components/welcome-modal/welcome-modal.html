<div class="welcome-backdrop" (click)="close.emit()" role="dialog" aria-modal="true" [attr.aria-label]="i18n.t('welcome.title')">
  <div class="welcome-card" (click)="$event.stopPropagation()">

    <div class="welcome-header">
      <svg class="welcome-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="4" width="18" height="24" rx="2" fill="#1e3a6e" stroke="#2563eb" stroke-width="1.5"/>
        <path d="M7 10h8M7 14h8M7 18h5" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 18l4 4-4 4" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M26 22H18" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1 class="welcome-title">{{ i18n.t('welcome.title') }}</h1>
    </div>

    <div class="welcome-section">
      <div class="welcome-section__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2L3 5.5V10c0 4 3.1 7.4 7 8 3.9-.6 7-4 7-8V5.5L10 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="welcome-section__body">
        <p class="welcome-section__heading">{{ i18n.t('welcome.privacyHeading') }}</p>
        <p class="welcome-section__text">{{ i18n.t('welcome.privacyText') }}</p>
      </div>
    </div>

    <div class="welcome-section">
      <div class="welcome-section__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="10" cy="10" rx="3.5" ry="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2.5 7.5h15M2.5 12.5h15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="welcome-section__body">
        <label class="welcome-section__heading" for="welcome-lang">{{ i18n.t('welcome.languageLabel') }}</label>
        <select
          id="welcome-lang"
          class="form-input welcome-lang-select"
          [value]="i18n.locale()"
          (change)="onLocaleChange($event)"
        >
          @for (loc of i18n.locales; track loc.code) {
            <option [value]="loc.code">{{ loc.label }}</option>
          }
        </select>
      </div>
    </div>

    <button class="btn btn--primary welcome-continue" (click)="close.emit()">
      {{ i18n.t('welcome.continueBtn') }}
    </button>

  </div>
</div>
