<aside class="settings-panel" [class.is-open]="isOpen()">
  <div class="settings-panel__header">
    <span class="settings-panel__title">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 4h12M2 8h12M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {{ i18n.t('settings.title') }}
    </span>
    <button class="btn btn--icon" (click)="closePanel.emit()" [title]="i18n.t('settings.closeTitle')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="settings-panel__body">
    <!-- Title -->
    <div class="form-group">
      <label for="meta-title">{{ i18n.t('settings.bookTitle') }}</label>
      <input
        id="meta-title"
        class="form-input"
        type="text"
        [value]="settings.metadata().title"
        (input)="onTitleChange($event)"
        [placeholder]="i18n.t('settings.bookTitlePlaceholder')"
      />
    </div>

    <!-- Author -->
    <div class="form-group">
      <label for="meta-author">{{ i18n.t('settings.author') }}</label>
      <input
        id="meta-author"
        class="form-input"
        type="text"
        [value]="settings.metadata().author"
        (input)="onAuthorChange($event)"
        [placeholder]="i18n.t('settings.authorPlaceholder')"
      />
    </div>

    <!-- Publisher -->
    <div class="form-group">
      <label for="meta-publisher">{{ i18n.t('settings.publisher') }}</label>
      <input
        id="meta-publisher"
        class="form-input"
        type="text"
        [value]="settings.metadata().publisher"
        (input)="onPublisherChange($event)"
        [placeholder]="i18n.t('settings.publisherPlaceholder')"
      />
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="meta-description">{{ i18n.t('settings.description') }}</label>
      <textarea
        id="meta-description"
        class="form-input"
        rows="3"
        [value]="settings.metadata().description"
        (input)="onDescriptionChange($event)"
        [placeholder]="i18n.t('settings.descriptionPlaceholder')"
      ></textarea>
    </div>

    <!-- Language -->
    <div class="form-group">
      <label for="meta-lang">{{ i18n.t('settings.language') }}</label>
      <select
        id="meta-lang"
        class="form-input"
        [value]="settings.metadata().language"
        (change)="onLanguageChange($event)"
      >
        @for (lang of languages; track lang.code) {
          <option [value]="lang.code">{{ lang.label }}</option>
        }
      </select>
    </div>

    <!-- EPUB Theme -->
    <div class="form-group">
      <label for="meta-theme">{{ i18n.t('settings.epubTheme') }}</label>
      <select
        id="meta-theme"
        class="form-input"
        [value]="settings.metadata().epubTheme"
        (change)="onEpubThemeChange($event)"
      >
        <option value="classic">{{ i18n.t('settings.themeClassic') }}</option>
        <option value="modern">{{ i18n.t('settings.themeModern') }}</option>
        <option value="minimal">{{ i18n.t('settings.themeMinimal') }}</option>
      </select>
    </div>

    <!-- EPUB Body Font -->
    <div class="form-group">
      <label for="meta-font">{{ i18n.t('settings.epubFont') }}</label>
      <select
        id="meta-font"
        class="form-input"
        [value]="settings.metadata().epubFont"
        (change)="onEpubFontChange($event)"
      >
        <option value="serif">{{ i18n.t('settings.fontSerif') }}</option>
        <option value="georgia">{{ i18n.t('settings.fontGeorgia') }}</option>
        <option value="sans">{{ i18n.t('settings.fontSans') }}</option>
        <option value="modern-sans">{{ i18n.t('settings.fontModernSans') }}</option>
        <option value="mono">{{ i18n.t('settings.fontMono') }}</option>
      </select>
    </div>

    <!-- Chapter Numbering -->
    <div class="form-group">
      <label for="meta-numbering">{{ i18n.t('settings.chapterNumbering') }}</label>
      <select
        id="meta-numbering"
        class="form-input"
        [value]="settings.metadata().chapterNumbering"
        (change)="onChapterNumberingChange($event)"
      >
        <option value="none">{{ i18n.t('settings.numberingNone') }}</option>
        <option value="arabic">{{ i18n.t('settings.numberingArabic') }}</option>
        <option value="roman">{{ i18n.t('settings.numberingRoman') }}</option>
        <option value="word">{{ i18n.t('settings.numberingWord') }}</option>
      </select>
    </div>

    <!-- Drop caps -->
    <label class="toggle-row">
      <div class="toggle-row__text">
        <span class="toggle-row__label">{{ i18n.t('settings.dropCaps') }}</span>
        <span class="toggle-row__desc">{{ i18n.t('settings.dropCapsDesc') }}</span>
      </div>
      <label class="toggle" for="drop-caps">
        <input
          id="drop-caps"
          type="checkbox"
          [checked]="settings.metadata().dropCaps"
          (change)="onDropCapsChange($event)"
        />
        <span class="toggle__track"></span>
      </label>
    </label>

    <div class="settings-divider"></div>

    <!-- Cover image -->
    <div class="form-group">
      <label>{{ i18n.t('settings.coverImage') }}</label>
      @if (settings.metadata().coverDataUrl) {
        <div class="cover-preview">
          <img [src]="settings.metadata().coverDataUrl" alt="Cover preview" class="cover-thumb" />
          <button class="btn btn--ghost btn--sm cover-remove" (click)="clearCover()">
            {{ i18n.t('settings.removeCover') }}
          </button>
        </div>
      } @else {
        <label class="cover-upload" for="cover-input">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2" y="2" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="7" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 13l4-4 3 3 3-3 4 4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          <span>{{ i18n.t('settings.uploadCover') }}</span>
          <span class="cover-upload__hint">{{ i18n.t('settings.uploadCoverHint') }}</span>
          <input
            id="cover-input"
            type="file"
            accept="image/jpeg,image/png,image/jpg"
            style="display: none"
            (change)="onCoverSelected($event)"
          />
        </label>
      }
    </div>

    <div class="settings-divider"></div>

    <!-- Chapter splitting -->
    <label class="toggle-row">
      <div class="toggle-row__text">
        <span class="toggle-row__label">{{ i18n.t('settings.splitChapters') }}</span>
        <span class="toggle-row__desc">{{ i18n.t('settings.splitChaptersDesc') }}</span>
      </div>
      <label class="toggle" for="split-chapters">
        <input
          id="split-chapters"
          type="checkbox"
          [checked]="settings.metadata().splitChapters"
          (change)="onSplitChaptersChange($event)"
        />
        <span class="toggle__track"></span>
      </label>
    </label>

    <details class="settings-advanced">
      <summary>{{ i18n.t('settings.advanced') }}</summary>
      <div class="form-group">
        <label for="meta-css">{{ i18n.t('settings.customCss') }}</label>
        <textarea
          id="meta-css"
          class="form-input form-input--code"
          rows="8"
          [value]="settings.metadata().customCss"
          (input)="onCustomCssChange($event)"
          [placeholder]="i18n.t('settings.customCssPlaceholder')"
          spellcheck="false"
        ></textarea>
        <p class="form-hint">{{ i18n.t('settings.customCssHint') }}</p>
      </div>
    </details>
  </div>
</aside>
