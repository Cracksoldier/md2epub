<aside class="settings-panel" [class.is-open]="isOpen()">
  <div class="settings-panel__header">
    <span class="settings-panel__title">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 4h12M2 8h12M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Book Settings
    </span>
    <button class="btn btn--icon" (click)="closePanel.emit()" title="Close settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="settings-panel__body">
    <!-- Title -->
    <div class="form-group">
      <label for="meta-title">Book Title</label>
      <input
        id="meta-title"
        class="form-input"
        type="text"
        [value]="settings.metadata().title"
        (input)="onTitleChange($event)"
        placeholder="My Book"
      />
    </div>

    <!-- Author -->
    <div class="form-group">
      <label for="meta-author">Author</label>
      <input
        id="meta-author"
        class="form-input"
        type="text"
        [value]="settings.metadata().author"
        (input)="onAuthorChange($event)"
        placeholder="Jane Doe"
      />
    </div>

    <!-- Language -->
    <div class="form-group">
      <label for="meta-lang">Language</label>
      <select
        id="meta-lang"
        class="form-input"
        [value]="settings.metadata().language"
        (change)="onLanguageChange($event)"
      >
        @for (lang of languages; track lang.code) {
          <option [value]="lang.code">{{ lang.label }}</option>
        }
      </select>
    </div>

    <div class="settings-divider"></div>

    <!-- Cover image -->
    <div class="form-group">
      <label>Cover Image</label>
      @if (settings.metadata().coverDataUrl) {
        <div class="cover-preview">
          <img [src]="settings.metadata().coverDataUrl" alt="Cover preview" class="cover-thumb" />
          <button class="btn btn--ghost btn--sm cover-remove" (click)="clearCover()">
            Remove cover
          </button>
        </div>
      } @else {
        <label class="cover-upload" for="cover-input">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2" y="2" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="7" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 13l4-4 3 3 3-3 4 4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          <span>Upload cover image</span>
          <span class="cover-upload__hint">JPG or PNG recommended</span>
          <input
            id="cover-input"
            type="file"
            accept="image/jpeg,image/png,image/jpg"
            style="display: none"
            (change)="onCoverSelected($event)"
          />
        </label>
      }
    </div>

    <div class="settings-divider"></div>

    <!-- Chapter splitting -->
    <label class="toggle-row">
      <div class="toggle-row__text">
        <span class="toggle-row__label">Split into chapters</span>
        <span class="toggle-row__desc">Split content at each H1 and H2 heading into separate EPUB chapters.</span>
      </div>
      <label class="toggle" for="split-chapters">
        <input
          id="split-chapters"
          type="checkbox"
          [checked]="settings.metadata().splitChapters"
          (change)="onSplitChaptersChange($event)"
        />
        <span class="toggle__track"></span>
      </label>
    </label>
  </div>
</aside>
