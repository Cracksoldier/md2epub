<div class="preview-backdrop" (click)="close.emit()" role="dialog" aria-modal="true"
     [attr.aria-label]="i18n.t('epubPreview.title')">
  <div #card class="preview-card" (click)="$event.stopPropagation()">

    <div class="preview-header">
      <div class="preview-nav">
        <button
          class="btn btn--icon"
          [disabled]="currentIndex() === 0"
          (click)="prev()"
          [attr.aria-label]="i18n.t('epubPreview.prev')"
          [title]="i18n.t('epubPreview.prev')"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="preview-label">
          @if (current().isCover) {
            {{ i18n.t('epubPreview.coverLabel') }}
          } @else {
            {{ i18n.t('epubPreview.chapterOf', chapterIndex().toString(), chapterCount().toString()) }}
          }
        </span>
        <button
          class="btn btn--icon"
          [disabled]="currentIndex() === total() - 1"
          (click)="next()"
          [attr.aria-label]="i18n.t('epubPreview.next')"
          [title]="i18n.t('epubPreview.next')"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <button class="btn btn--icon" (click)="close.emit()" [title]="i18n.t('epubPreview.closeTitle')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="preview-chapter-title">{{ current().label }}</div>

    <iframe
      class="preview-frame"
      sandbox=""
      [srcdoc]="srcdoc()"
      [title]="i18n.t('epubPreview.title')"
    ></iframe>

    <div class="preview-footer">
      <button class="btn btn--ghost" (click)="close.emit()">
        {{ i18n.t('epubPreview.close') }}
      </button>
      <button class="btn btn--primary" (click)="download.emit()" [title]="i18n.t('epubPreview.downloadTitle')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 1v8M4 6.5L7 9.5l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 10v1.5A1.5 1.5 0 002.5 13h9a1.5 1.5 0 001.5-1.5V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ i18n.t('epubPreview.download') }}
      </button>
    </div>

  </div>
</div>
