<section
  class="pane pane--editor"
  [class.drag-over]="isDragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  <div class="pane__header">
    <span class="pane__label">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M4 4h6M4 7h6M4 10h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      {{ i18n.t('editor.label') }}
    </span>
    <div class="pane__header-actions">
      <span class="word-count">{{ wordCount() }} {{ i18n.t('editor.words') }}</span>
      <button class="btn btn--icon btn--sm" (click)="openFileDialog()" [title]="i18n.t('editor.importTitle')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M6.5 1v7M4 5.5l2.5 2.5 2.5-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 9.5v1a1.5 1.5 0 001.5 1.5h8A1.5 1.5 0 0012 10.5v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="btn btn--icon btn--sm" (click)="clear()" [title]="i18n.t('editor.clearTitle')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 2l9 9M11 2l-9 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="format-bar" role="toolbar" aria-label="Formatting">
    <button class="format-btn" (click)="format('h1')" title="Heading 1  (#)">H1</button>
    <button class="format-btn" (click)="format('h2')" title="Heading 2  (##)">H2</button>
    <span class="format-sep" aria-hidden="true"></span>
    <button class="format-btn format-btn--bold" (click)="format('bold')" title="Bold  (Ctrl+B)">B</button>
    <button class="format-btn format-btn--italic" (click)="format('italic')" title="Italic  (Ctrl+I)"><em>I</em></button>
    <button class="format-btn" (click)="format('code')" title="Inline code  (\`)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 3.5L1 6.5l3 3M9 3.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="format-btn" (click)="format('link')" title="Link  ([text](url))">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M5 8l3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M3.5 6.5L2.5 7.5a2.121 2.121 0 000 3 2.121 2.121 0 003 0l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M9.5 6.5l1-1a2.121 2.121 0 000-3 2.121 2.121 0 00-3 0l-1 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <span class="format-sep" aria-hidden="true"></span>
    <button class="format-btn" (click)="format('quote')" title="Blockquote  (>)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 4h4v4H2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M7 4h4v4H7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M2 8c0 1.5 1 2 2 2M7 8c0 1.5 1 2 2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="format-btn" (click)="format('ul')" title="Unordered list  (-)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="2.5" cy="3.5" r="1" fill="currentColor"/>
        <circle cx="2.5" cy="6.5" r="1" fill="currentColor"/>
        <circle cx="2.5" cy="9.5" r="1" fill="currentColor"/>
        <path d="M5 3.5h6M5 6.5h6M5 9.5h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="editor-body">
    @if (showChapterList()) {
      <app-chapter-list (chapterSelect)="scrollToOffset($event)"></app-chapter-list>
    }
    <textarea
      #textarea
      class="editor"
      [value]="editorState.content()"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      (scroll)="onEditorScroll($event)"
      [placeholder]="i18n.t('editor.placeholder')"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    ></textarea>
  </div>

  <div class="drop-hint" aria-hidden="true">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2v14M7 11l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    {{ i18n.t('editor.dropHint') }}
  </div>

  <input
    #fileInput
    type="file"
    accept=".md,.txt,text/markdown,text/plain"
    style="display: none"
    (change)="onFileSelected($event)"
  />
</section>
