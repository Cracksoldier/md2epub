<section
  class="pane pane--editor"
  [class.drag-over]="isDragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  <div class="pane__header">
    <span class="pane__label">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M4 4h6M4 7h6M4 10h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Markdown
    </span>
    <div class="pane__header-actions">
      <span class="word-count">{{ wordCount() }} words</span>
      <button class="btn btn--icon btn--sm" (click)="openFileDialog()" title="Import file">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M6.5 1v7M4 5.5l2.5 2.5 2.5-2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 9.5v1a1.5 1.5 0 001.5 1.5h8A1.5 1.5 0 0012 10.5v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="btn btn--icon btn--sm" (click)="clear()" title="Clear editor">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2 2l9 9M11 2l-9 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <textarea
    #textarea
    class="editor"
    [value]="editorState.content()"
    (input)="onInput($event)"
    (keydown)="onKeyDown($event)"
    placeholder="# My Book Title&#10;&#10;Start writing your book here...&#10;&#10;Drop a .md file anywhere to import it."
    spellcheck="false"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
  ></textarea>

  <div class="drop-hint" aria-hidden="true">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2v14M7 11l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Drop .md file to import
  </div>

  <input
    #fileInput
    type="file"
    accept=".md,.txt,text/markdown,text/plain"
    style="display: none"
    (change)="onFileSelected($event)"
  />
</section>
